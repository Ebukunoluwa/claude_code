# Sizor scoring configuration.
# Clinical reviewers: edit values here; every save is a new rubric_version.
# The engine hashes this file into every RiskScore for DCB0129 audit.

scoring:
  w_state: 0.6
  w_trajectory: 0.4
  ewma_lambda: 0.3        # lower = more smoothing, less reactive
  modifier_cap: 25.0
  band_amber_threshold: 40.0
  band_red_threshold: 70.0
  engine_version: "1.0.0"

pathways:
  post_cardiac_surgery:
    name: post_cardiac_surgery
    display_name: "Post-cardiac surgery"
    rubric_version: "2025-10-pcs-v1"
    domains:
      - { domain: pain,          weight: 0.15 }
      - { domain: breathlessness, weight: 0.25 }
      - { domain: wound,         weight: 0.20 }
      - { domain: chest_symptoms, weight: 0.20 }
      - { domain: mood,          weight: 0.10 }
      - { domain: adherence,     weight: 0.10 }
    # Expected recovery curve — clinician-defined, refine with real data later.
    # Score expected to trend DOWN as patient recovers.
    expected_curve:
      - { day: 0,  expected_score: 55 }
      - { day: 3,  expected_score: 45 }
      - { day: 7,  expected_score: 30 }
      - { day: 14, expected_score: 20 }
      - { day: 30, expected_score: 10 }
    compound_red_flags:
      # Each inner list = ALL must be true to fire
      - [[wound, 3], [pain, 3]]              # worsening wound + severe pain
      - [[breathlessness, 3], [chest_symptoms, 2]]  # SOB + chest discomfort

  depression:
    name: depression
    display_name: "Depression / low mood"
    rubric_version: "2025-10-dep-v1"
    domains:
      - { domain: mood,          weight: 0.35 }
      - { domain: anhedonia,     weight: 0.20 }
      - { domain: sleep,         weight: 0.15 }
      - { domain: functioning,   weight: 0.15 }
      - { domain: adherence,     weight: 0.15 }
    expected_curve:
      - { day: 0,  expected_score: 50 }
      - { day: 14, expected_score: 40 }
      - { day: 28, expected_score: 30 }
      - { day: 56, expected_score: 20 }
    compound_red_flags:
      - [[mood, 3], [functioning, 3]]
