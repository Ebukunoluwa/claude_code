{# Jinja2 macro-style partial. Expects `flag` in context. #}
{% if flag %}
  {% set level = flag.urgency_level %}
  <span class="inline-block px-3 py-1 rounded-full text-sm font-bold uppercase tracking-wide
               badge-{{ level }}">
    {{ level }}
  </span>
{% else %}
  <span class="inline-block px-3 py-1 rounded-full text-sm font-medium badge-none">
    No flag
  </span>
{% endif %}
