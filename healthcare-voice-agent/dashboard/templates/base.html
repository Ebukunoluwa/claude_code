<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}NHS Voice Agent Dashboard{% endblock %}</title>

  <!-- TailwindCSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- HTMX CDN -->
  <script src="https://unpkg.com/htmx.org@1.9.10" crossorigin="anonymous"></script>

  <style>
    /* Urgency badge colours */
    .badge-red    { @apply bg-red-100 text-red-800 border border-red-300; }
    .badge-amber  { @apply bg-amber-100 text-amber-800 border border-amber-300; }
    .badge-green  { @apply bg-green-100 text-green-800 border border-green-300; }
    .badge-none   { @apply bg-gray-100 text-gray-600 border border-gray-300; }
  </style>
</head>
<body class="h-full font-sans text-gray-900 antialiased">

  <!-- Nav -->
  <nav class="bg-blue-700 text-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 font-semibold text-lg tracking-tight">
        <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2"
             viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0
                   01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13
                   -2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2
                   2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
        </svg>
        NHS Voice Agent
      </a>
      <span class="text-sm opacity-75">Post-Appointment Care Dashboard</span>
    </div>
  </nav>

  <!-- Main content -->
  <main class="max-w-7xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
